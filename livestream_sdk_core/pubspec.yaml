name: livestream_sdk_core
description: >-
  Pure-Dart domain-tracker core (GENP-3261 WS-A) shared by the user apps and
  the feed_util Livestream SDK. No Flutter, no get_it, no log_kit — every
  external dependency is constructor-injected.
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.8.0

# Minimal-dependency policy (mirrors apps/feed_util/pubspec.yaml): this
# package ships inside the add-to-app SDK artifacts, so runtime deps stay at
# dio + model annotations + webcrypto (the only native-code dependency, for
# AES cover decryption). get_it / sentry / log_kit / shared_preferences are
# deliberately absent — they enter through the ports in lib/src/port/.
dependencies:
  dio: ^5.8.0+1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  # AES-CTR/CBC decryption of encrypted public assets (cover images), reused by
  # AesDecryptFusedTransformer. webcrypto is Dart-SDK compatible (deps: ffi +
  # native_toolchain_cmake, no Flutter), so this package stays Flutter-free;
  # it does add a native (BoringSSL) build step. Constraint matches
  # apps/feed_util to avoid a workspace resolution split.
  webcrypto: ^0.5.8

dev_dependencies:
  build_runner: ^2.5.4
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  test: ^1.25.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1
